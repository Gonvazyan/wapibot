<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WapiBot Admin</title>
  <script>if (localStorage.getItem('wapibot_pwd')) document.documentElement.classList.add('autologin');</script>
  <style>
    html.autologin #loginScreen { display: none !important; }
    html.autologin #adminPanel  { display: block !important; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; }

    /* LOGIN */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #075e54; }
    .login-box { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .login-box h1 { font-size: 28px; margin-bottom: 8px; }
    .login-box p  { color: #666; margin-bottom: 24px; }
    .login-box input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
    .login-box input:focus { outline: none; border-color: #075e54; }

    /* HEADER */
    header { background: #075e54; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 20px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-right span { font-size: 14px; opacity: 0.8; }
    .btn-logout { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    /* LAYOUT */
    .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }

    /* CARD */
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0; }
    .card-header h2 { font-size: 18px; color: #075e54; }
    .card-body { margin-top: 20px; }
    .card-body.collapsed { display: none; }
    .toggle-form-btn { background: none; border: 2px solid #075e54; color: #075e54; border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .toggle-form-btn:hover { background: #075e54; color: white; }

    /* FORM */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid .full { grid-column: 1 / -1; }
    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; }
    input[type="text"], input[type="password"], textarea {
      width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0;
      border-radius: 8px; font-size: 14px; font-family: inherit;
    }
    input[type="text"]:focus, input[type="password"]:focus, textarea:focus { outline: none; border-color: #075e54; }
    textarea { resize: vertical; min-height: 70px; }

    /* BUTTONS */
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary   { background: #075e54; color: white; }
    .btn-danger    { background: #ff4444; color: white; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-warning   { background: #ff9800; color: white; }
    .btn-success   { background: #075e54; color: white; }
    .btn-full      { width: 100%; padding: 12px; }
    .btn-icon      { padding: 8px 12px; font-size: 16px; }

    /* BUSINESS LIST */
    .business-list { display: flex; flex-direction: column; gap: 12px; }
    .business-item {
      border: 2px solid #e0e0e0; border-radius: 10px; padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
      transition: border-color 0.2s, background 0.3s;
    }
    .business-item:hover { border-color: #075e54; }
    .business-item.inactive { opacity: 0.5; }
    .business-item.highlight { background: #e6f4f1; border-color: #075e54; }
    .business-info h3 { font-size: 16px; margin-bottom: 4px; }
    .business-info p  { font-size: 13px; color: #666; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; margin-left: 8px; }
    .badge-active    { background: #e6f4f1; color: #075e54; }
    .badge-inactive  { background: #ffe0e0; color: #cc0000; }
    .badge-confirmed { background: #e6f4f1; color: #075e54; }
    .badge-cancelled { background: #ffe0e0; color: #cc0000; }
    .badge-pending   { background: #fff3e0; color: #e65100; }
    .business-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }

    /* TOGGLE SWITCH */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 24px; transition: 0.3s; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    input:checked + .slider { background: #075e54; }
    input:checked + .slider:before { transform: translateX(20px); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .modal { background: white; border-radius: 12px; padding: 24px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .modal-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title h2 { font-size: 18px; color: #075e54; }
    .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #999; line-height: 1; }
    .modal-close:hover { color: #333; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

    /* NOTES */
    .note-item { display:flex; align-items:center; justify-content:space-between; background:#f8f9fa; border-radius:8px; padding:10px 14px; font-size:14px; }
    .note-item span { flex:1; }
    .note-del { background:none; border:none; cursor:pointer; font-size:16px; color:#ff4444; padding:0 4px; }
    .btn-notes { background:#e8f5e9; color:#075e54; border:none; }
    .btn-notes:hover { background:#075e54; color:white; }

    /* APPOINTMENTS */
    .btn-appts { background:#e8f0fe; color:#1a73e8; border:none; }
    .btn-appts:hover { background:#1a73e8; color:white; }
    .appt-item { background:#f8f9fa; border-radius:8px; padding:12px 16px; font-size:13px; display:flex; flex-direction:column; gap:6px; }
    .appt-header { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .appt-header strong { font-size:14px; }
    .appt-meta { color:#555; }
    .appt-notes { color:#075e54; font-style:italic; padding:6px 10px; background:#e6f4f1; border-radius:6px; }
    .appt-cancel-btn { background:none; border:1px solid #ff4444; color:#ff4444; border-radius:6px; padding:3px 8px; font-size:11px; cursor:pointer; white-space:nowrap; }
    .appt-cancel-btn:hover { background:#ff4444; color:white; }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>🤖 WapiBot</h1>
    <p>Panel de administración</p>
    <input type="password" id="passwordInput" placeholder="Contraseña" />
    <button class="btn btn-primary btn-full" id="loginBtn">Entrar</button>
  </div>
</div>

<div id="adminPanel" class="hidden">
  <header>
    <h1>🤖 WapiBot Admin</h1>
    <div class="header-right">
      <span id="businessCount">0 negocios</span>
      <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </header>
  <div class="container">

    <!-- NUEVO NEGOCIO (colapsable) -->
    <div class="card">
      <div class="card-header">
        <h2>➕ Nuevo negocio</h2>
        <button class="toggle-form-btn" id="toggleFormBtn">Mostrar</button>
      </div>
      <div class="card-body collapsed" id="createFormBody">
        <div class="form-grid">
          <div>
            <label>Nombre del negocio *</label>
            <input type="text" id="f_name" placeholder="Ej: Peluquería María" />
          </div>
          <div>
            <label>Tipo de negocio</label>
            <input type="text" id="f_type" placeholder="Ej: peluquería, restaurante..." />
          </div>
          <div>
            <label>Phone Number ID de Meta *</label>
            <input type="text" id="f_phone_id" placeholder="Ej: 1082028861652687" />
          </div>
          <div>
            <label>Teléfono de contacto</label>
            <input type="text" id="f_phone" placeholder="Ej: +34 600 000 000" />
          </div>
          <div>
            <label>Horario</label>
            <input type="text" id="f_schedule" placeholder="Ej: Lunes a Viernes 9:00-18:00" />
          </div>
          <div>
            <label>Dirección</label>
            <input type="text" id="f_address" placeholder="Ej: Calle Gran Vía 1, Madrid" />
          </div>
          <div class="full">
            <label>Servicios / Descripción para el bot</label>
            <textarea id="f_services" placeholder="Describe los servicios que ofrece el negocio..."></textarea>
          </div>
        </div>
        <div style="margin-top:16px">
          <button class="btn btn-primary" id="createBtn">Crear negocio</button>
        </div>
      </div>
    </div>

    <!-- LISTA DE NEGOCIOS -->
    <div class="card">
      <div class="card-header" style="margin-bottom:16px">
        <h2>🏪 Negocios registrados</h2>
      </div>
      <div class="business-list" id="businessList">
        <p style="color:#999;text-align:center;padding:20px">Cargando...</p>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- MODAL AVISOS -->
<div class="modal-overlay hidden" id="notesModal">
  <div class="modal">
    <div class="modal-title">
      <h2>📋 Avisos del día</h2>
      <button class="modal-close" id="notesCancelBtn">✕</button>
    </div>
    <p style="font-size:13px;color:#666;margin-bottom:16px">El bot usará estos avisos en sus respuestas automáticamente.</p>
    <input type="hidden" id="n_business_id" />
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input type="text" id="n_note" placeholder="Ej: Hoy sin paella de marisco" style="flex:1" />
      <button class="btn btn-primary" id="addNoteBtn">Añadir</button>
    </div>
    <div id="notesList" style="display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto"></div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <div class="modal-title">
      <h2>✏️ Editar negocio</h2>
      <button class="modal-close" id="editCancelBtn">✕</button>
    </div>
    <input type="hidden" id="e_id" />
    <div class="form-grid">
      <div>
        <label>Nombre del negocio *</label>
        <input type="text" id="e_name" />
      </div>
      <div>
        <label>Tipo de negocio</label>
        <input type="text" id="e_type" />
      </div>
      <div>
        <label>Phone Number ID de Meta *</label>
        <input type="text" id="e_phone_id" />
      </div>
      <div>
        <label>Teléfono de contacto</label>
        <input type="text" id="e_phone" />
      </div>
      <div>
        <label>Horario</label>
        <input type="text" id="e_schedule" />
      </div>
      <div>
        <label>Dirección</label>
        <input type="text" id="e_address" />
      </div>
      <div class="full">
        <label>Servicios / Descripción para el bot</label>
        <textarea id="e_services" style="min-height:120px"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="editCancelBtn2">Cancelar</button>
      <button class="btn btn-success" id="editSaveBtn">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- MODAL RESERVAS -->
<div class="modal-overlay hidden" id="apptsModal">
  <div class="modal" style="max-width:700px">
    <div class="modal-title">
      <h2 id="apptsModalTitle">📅 Reservas</h2>
      <button class="modal-close" id="apptsCancelBtn">✕</button>
    </div>
    <div id="apptsList" style="display:flex;flex-direction:column;gap:10px;max-height:500px;overflow-y:auto"></div>
  </div>
</div>

<script src="/admin.js"></script>
</body>
</html>
